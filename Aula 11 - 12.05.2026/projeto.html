<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projeto</title>
    <link rel="stylesheet" href="bootstrap/css/bootstrap.min.css">
    <script type="text/javascript" src="vue.js"></script>
</head>
<body>
    <div id="app" class="container">
        <div class="row">
            <div class="col-md-6"> 
                <h1>Cadastro de Livro</h1>
                <form action="#" method="post" @submit.prevent="salvar()">
                    <label for="codigo">Código:</label>
                    <input type="number" class="form-control mb-2" v-model="codigo">
                    <label for="titulo">Título:</label>
                    <input type="text" class="form-control mb-2" v-model="titulo">
                    <label for="editora">Editora:</label>
                    <input type="text" class="form-control mb-2" v-model="editora">
                    <label for="ano">Ano:</label>
                    <input type="number" class="form-control mb-2" v-model="ano">
                    <div v-if="verificar()">
                        <button class="btn btn-primary">Salvar</button>                        
                    </div>
                    <div v-else>
                        <button class="btn btn-secondary" disabled>Salvar</button>
                    </div>
                </form>
            </div>
            <div class="col-md-6">
                <h1>Lista de Livros</h1>
                <table class="table table-striped">
                    <thead>
                        <tr>
                            <th>Código</th>
                            <th>Título</th>
                            <th>Editora</th>
                            <th>Ano</th>
                            <th>Alterar</th>
                            <th>Excluir</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-for="(livro, posicao) in listaLivros">
                            <td>{{ livro.codigo }}</td>
                            <td>{{ livro.titulo }}</td>
                            <td>{{ livro.editora }}</td>
                            <td>{{ livro.ano }}</td>
                            <td>
                                <a href="#" class="btn btn-warning" @click="alterar(posicao)">Alterar</a>
                            </td>
                            <td>
                                <a href="#" class="btn btn-danger" @click="excluir(posicao)">Excluir</a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <script type="text/javascript">
        class Livro {
            constructor(codigo, titulo, editora, ano) {
                this.codigo = codigo
                this.titulo = titulo
                this.editora = editora
                this.ano = ano
            }
        }

        let app = new Vue({
            el: '#app',
            data: {
                codigo: '',
                titulo: '',
                editora: '',
                ano: '',
                posicao: -1, 
                listaLivros: []
            },
            methods: {
                salvar: function() {
                    let livro = new Livro(this.codigo, this.titulo, this.editora, this.ano)
                    if (this.posicao == -1) {
                        this.listaLivros.push(livro)
                    }
                    else {
                        Vue.set(this.listaLivros, this.posicao, livro)
                    }
                    this.armazenar()
                    this.limpar()
                },
                verificar: function() {
                    return this.codigo != '' && this.titulo != '' && this.editora != '' && this.ano != ''
                },
                limpar: function() {
                    this.posicao = -1
                    this.codigo = ''
                    this.titulo = ''
                    this.editora = ''
                    this.ano = ''
                },
                alterar: function(posicao) {
                    this.posicao = posicao
                    this.codigo = this.listaLivros[posicao].codigo
                    this.titulo = this.listaLivros[posicao].titulo
                    this.editora = this.listaLivros[posicao].editora
                    this.ano = this.listaLivros[posicao].ano
                },
                excluir: function(posicao) {
                    if (confirm('Tem certeza que deseja excluir?')) {
                        this.listaLivros.splice(posicao, 1)
                        this.armazenar()
                    }
                },
                armazenar: function() {
                    localStorage.setItem('listaLivros', JSON.stringify(this.listaLivros))
                },
                carregar: function() {
                    let dados = localStorage.getItem('listaLivros')
                }
            }
        }) 






    </script>
</body>
</html>
