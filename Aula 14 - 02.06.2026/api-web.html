<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <meta http-equiv="X-UA-Compatible" content="E=edge">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Web API</title>
        <script type="text/javascript" src="vue.js"></script>
    </head>
    <body>
        <div id="app">
            <table>
                <tr v-for="usuario in lista">
                    <td>{{ usuario.id }}</td>
                    <td>{{ usuario.name }}</td>
                    <td>{{ usuario.email }}</td>
                </tr>
            </table>
            <button @click="carregar()">Carregar</button>
        </div>
        <script type="text/javascript">
            let endpoint = 'https://jsonplaceholder.typicode.com/users'

            let app = new Vue({
                el: '#app',
                data: {
                    lista: []
                },
                methods: {
                    carregar: async function() {
                        let dados = await fetch(endpoint, { 
                            method: 'GET'
                        }).then(res => res.json()).catch(erro => alert(erro)) //resposta do endpoint joga na variavel res, ai antes ela vira objeto e retorna para a variavel dados.
                        this.lista = dados
                    }
                }

            })
        </script>
    </body>
</html>
