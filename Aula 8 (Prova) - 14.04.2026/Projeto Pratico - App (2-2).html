<!DOCTYPE html>

<html lang="pt-br">
    
    <head>

        <title>Projeto Pratico - Aplicação</title>
        <meta charset="UTF-8">
        <style>
            body {
                font-family: Arial, sans-serif;
                background-color: #f4f6f8;
                margin: 40px;
                color: #333;
            }

            h1 {
                text-align: center;
                color: #a7118e;
            }

            p {
                font-size: 16px;
            }

            select, button {
                padding: 8px 12px;
                margin-top: 10px;
                font-size: 14px;
                border-radius: 6px;
                border: 1px solid #a7118e;
            }

            button {
                background-color: #a7118e;
                color: white;
                cursor: pointer;
                border: none;
                transition: 0.2s;
            }

            button:hover {
                background-color: #000203;
            }

            table {
                width: 100%;
                border-collapse: collapse;
                margin-top: 20px;
                background-color: white;
                border-radius: 8px;
                overflow: hidden;
                box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            }

            thead {
                background-color: #0d60b3;
                color: white;
            }

            th, td {
                padding: 10px;
                text-align: left;
                border-bottom: 1px solid #0d60b3;
            }

            tr:hover {
                background-color: #dfb6d6;
            }

            #resposta {
                display: block;
                margin-top: 15px;
                padding: 10px;
                background-color: #ffffff;
                border-radius: 6px;
            }
        </style>

        <script type="text/javascript">

            let historico = []
            let perguntas = []

            function atualizarTabela() {

                let tab = document.getElementById('tabelaHistorico')
                tab.innerHTML = ''

                for (let i = 0; i < historico.length; i++) {
                    tab.innerHTML += `
                        <tr>
                            <td>${perguntas[i]}</td>
                            <td>${historico[i]}</td>
                        </tr>
                    `
                }
            }

            function limparHistorico() {

                historico = []
                atualizarTabela()

            }

            window.onload = function() {
                document.getElementById('btnResposta').onclick = function() {
                    
                    if ((document.getElementById('tipo').value) == "1") {
                        let resposta1 = "Vetores ou arrays é um tipo de variavel onde possibilita armazenar dados ordenados com base em indice, que são vitais na utilização em listas e banco de dados. Ao contrario da definição de uma variavel comum como int que é feita como (let variavel = 3), o vetor é definido com colchetes (const vetor = []). Em logica, cada vetor possui indices infinitos (vetor = [0 , 1 , 2 , 3]) que possibilita o armazenamento e manipulação de inumeros dados diferentes."

                        document.getElementById('resposta').innerHTML = 'Resposta: ' + resposta1

                        let pergunta = "O que são vetores e como eles são utilizados em javascript"

                        perguntas.push(pergunta)
                        historico.push(resposta1)
                        atualizarTabela()
                    }
                    else if ((document.getElementById('tipo').value) == "2") {
                       let resposta2 = "Funções são pequenos codigos pre definidos, também chamados de sub programa, onde recebe dados, processa dentro da função em um codigo pre definido e retorna um resultado, como se fosse uma dimensão particular que funciona com a entrada, processo e retorno sem influenciar leis globais."

                        document.getElementById('resposta').innerHTML = 'Resposta: ' + resposta2

                        let pergunta = "O que são funções e como eles são utilizados em JavaScript."
                        
                        perguntas.push(pergunta)
                        historico.push(resposta2)
                        atualizarTabela()
                    }
                    else if ((document.getElementById('tipo').value) == "3") {
                       let resposta3 = "Eventos são as interações do beck-end com o usuario, onde a partir de uma determinada ação, é executado uma serie de instruções e retornado alguma interação. Por exemplo, quando o usuario clica em um botão em um site, é acionado um novo evento que processa um codigo e registra um dado logo mudando de tela (como em uma tela de login)."

                        document.getElementById('resposta').innerHTML = 'Resposta: ' + resposta3

                        let pergunta = "O que são eventos e apresente exemplos."
                        
                        perguntas.push(pergunta)
                        historico.push(resposta3)
                        atualizarTabela()
                    }

                }
            }

        </script>

    </head>
    <body>

        <h1>Projeto Pratico - Aplicação</h1>
 
        <br>
        <p>SELECIONE UMA QUESTÃO E VEJA A RESPOSTA ABAIXO:</p>
        <select id="tipo" >
            <option value="1">O que são vetores e como eles são utilizados em javascript.</option>
            <option value="2">O que são funções e como eles são utilizados em JavaScript.</option>
            <option value="3">O que são eventos e apresente exemplos.</option>
        </select>

        <button id="btnResposta">VER RESPOSTA</button>
        <p><b id="resposta">Resposta: </b></p>

        <br>

        <table>
            <thead>
                <tr>
                    <th>HISTORICO</th>
                    <th></th>

                </tr>
            </thead>
            <tbody id="tabelaHistorico">
            </tbody>
        </table>
        <br>
        <button onclick="limparHistorico()">LIMPAR HISTÓRICO</button>

    </body>

</html>
